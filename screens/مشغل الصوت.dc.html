<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>* { -webkit-tap-highlight-color: transparent; }</style>
</helmet>
<div dir="rtl" style="position:relative; width:390px; height:844px; margin:0 auto; background:#1f4a42; font-family:'IBM Plex Sans Arabic',sans-serif; color:#f6f0e2; overflow:hidden; box-shadow:0 30px 80px -20px rgba(35,40,38,.5);">

  <!-- ambient geometric motif -->
  <div style="position:absolute; left:50%; top:-90px; transform:translateX(-50%); width:320px; height:320px; border:1px solid rgba(201,164,99,.1); border-radius:50%;"></div>
  <div style="position:absolute; left:50%; top:-40px; transform:translateX(-50%); width:220px; height:220px; border:1px solid rgba(201,164,99,.08); border-radius:50%;"></div>

  <!-- status bar -->
  <div style="position:relative; display:flex; align-items:center; justify-content:space-between; padding:14px 24px 4px; font-size:14px; font-weight:600; color:#f6f0e2;">
    <span style="letter-spacing:.5px;">٩:٤١</span>
    <span style="display:flex; gap:6px; align-items:center; font-size:12px; opacity:.85;">
      <span>●●●●</span><span style="font-size:13px;">⌁</span><span style="border:1.5px solid #f6f0e2; border-radius:3px; padding:1px 4px 1px 3px; font-size:9px; line-height:1;">٨٤</span>
    </span>
  </div>

  <!-- top bar -->
  <div style="position:relative; display:flex; align-items:center; justify-content:space-between; padding:10px 18px;">
    <button style="width:42px; height:42px; border:none; background:rgba(255,255,255,.08); border-radius:13px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#dfe7e3" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="12" x2="18" y2="12"></line></svg>
    </button>
    <span style="font-size:12px; font-weight:500; color:#a9bdb6; letter-spacing:.3px;">شرح الأصول الثلاثة</span>
    <button style="width:42px; height:42px; border:none; background:rgba(255,255,255,.08); border-radius:13px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#dfe7e3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.4"></circle><circle cx="12" cy="12" r="1.4"></circle><circle cx="12" cy="19" r="1.4"></circle></svg>
    </button>
  </div>

  <!-- artwork emblem -->
  <div style="position:relative; display:flex; justify-content:center; margin-top:42px;">
    <div style="width:148px; height:148px; border-radius:30px; background:#16352f; border:1px solid rgba(201,164,99,.32); display:flex; align-items:center; justify-content:center; box-shadow:0 24px 50px -20px rgba(0,0,0,.6);">
      <div style="width:74px; height:74px; border:1.5px solid rgba(201,164,99,.55); transform:rotate(45deg); display:flex; align-items:center; justify-content:center;">
        <div style="width:40px; height:40px; border:1.5px solid rgba(201,164,99,.4);"></div>
      </div>
    </div>
  </div>

  <!-- title -->
  <div style="position:relative; text-align:center; margin-top:34px; padding:0 32px;">
    <div style="font-size:11px; color:#c9a463; font-weight:500; margin-bottom:8px;">الدرس الخامس</div>
    <h1 style="font-family:'Amiri',serif; font-size:25px; font-weight:700; color:#f6f0e2; margin:0; line-height:1.35;">باب الأصل الأول: معرفة الله</h1>
    <div style="font-size:13px; color:#a9bdb6; margin-top:10px;">الشيخ عبد الله بن سالم</div>
  </div>

  <!-- waveform -->
  <div style="position:relative; margin-top:30px; padding:0 28px;">
    <div onClick="{{ seek }}" style="display:flex; align-items:center; gap:2.5px; height:48px; cursor:pointer;">
      <sc-for list="{{ bars }}" as="bar" hint-placeholder-count="48">
        <div style="flex:1; height:{{ bar.h }}; background:{{ bar.color }}; border-radius:2px; min-width:2px;"></div>
      </sc-for>
    </div>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-top:10px;">
      <span style="font-size:12px; color:#c9a463; font-variant-numeric:tabular-nums; font-weight:600;">١٨:٤٢</span>
      <span style="font-size:12px; color:#7e948c; font-variant-numeric:tabular-nums;">٣٠:١٥</span>
    </div>
  </div>

  <!-- transport controls -->
  <div style="position:relative; display:flex; align-items:center; justify-content:center; gap:22px; margin-top:24px;">
    <!-- back 10 -->
    <button style="width:54px; height:54px; border:none; background:transparent; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; color:#dfe7e3;">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#dfe7e3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"></path><polyline points="3 4 3 9 8 9"></polyline></svg>
      <span style="font-size:9px; color:#a9bdb6; font-weight:600;">١٠</span>
    </button>
    <!-- play/pause -->
    <button onClick="{{ togglePlay }}" style="width:78px; height:78px; border:none; background:#c9a463; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 14px 30px -10px rgba(201,164,99,.6);">
      <sc-if value="{{ playing }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex; gap:6px;"><span style="width:6px; height:26px; background:#16352f; border-radius:2px;"></span><span style="width:6px; height:26px; background:#16352f; border-radius:2px;"></span></div>
      </sc-if>
      <sc-if value="{{ paused }}" hint-placeholder-val="{{ false }}">
        <div style="width:0; height:0; border-top:14px solid transparent; border-bottom:14px solid transparent; border-right:22px solid #16352f; margin-left:-4px;"></div>
      </sc-if>
    </button>
    <!-- forward 10 -->
    <button style="width:54px; height:54px; border:none; background:transparent; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#dfe7e3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"></path><polyline points="21 4 21 9 16 9"></polyline></svg>
      <span style="font-size:9px; color:#a9bdb6; font-weight:600;">١٠</span>
    </button>
  </div>

  <!-- bottom utility bar -->
  <div style="position:absolute; left:18px; right:18px; bottom:26px; display:flex; align-items:center; justify-content:space-between;">
    <!-- speed -->
    <button onClick="{{ cycleSpeed }}" style="display:flex; align-items:center; gap:7px; border:none; background:rgba(255,255,255,.07); border-radius:14px; padding:11px 15px; cursor:pointer;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a463" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"></circle><path d="M12 13l3-2.5"></path><path d="M9 2h6"></path></svg>
      <span style="font-size:13px; font-weight:600; color:#f6f0e2; font-variant-numeric:tabular-nums; min-width:30px; text-align:center;">{{ speedLabel }}</span>
    </button>

    <!-- download -->
    <button style="display:flex; align-items:center; gap:8px; border:none; background:rgba(255,255,255,.07); border-radius:14px; padding:11px 16px; cursor:pointer;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#dfe7e3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"></path><polyline points="7 11 12 16 17 11"></polyline><path d="M5 20h14"></path></svg>
      <span style="font-size:13px; font-weight:500; color:#dfe7e3;">تحميل</span>
    </button>

    <!-- minimize -->
    <button style="width:46px; height:46px; border:none; background:rgba(255,255,255,.07); border-radius:14px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#dfe7e3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 4 12 8 16 4"></polyline><line x1="12" y1="8" x2="12" y2="20"></line></svg>
    </button>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  state = { playing: true, speedIdx: 1 };
  renderVals() {
    const speeds = ['٠٫٧٥×','١٫٠×','١٫٢٥×','١٫٥×','٢٫٠×'];
    // calm pseudo-random waveform; 62% played
    const heights = [10,16,22,14,26,32,20,12,18,28,34,24,16,22,30,40,28,18,12,20,26,36,30,22,14,24,32,26,18,28,38,30,20,14,22,30,24,16,26,34,22,14,18,28,20,12,16,10];
    const playedCount = Math.round(heights.length * 0.62);
    const bars = heights.map((h, i) => ({
      h: h + 'px',
      color: i < playedCount ? '#c9a463' : 'rgba(223,231,227,.22)'
    }));
    return {
      playing: this.state.playing,
      paused: !this.state.playing,
      togglePlay: () => this.setState(s => ({ playing: !s.playing })),
      speedLabel: speeds[this.state.speedIdx],
      cycleSpeed: () => this.setState(s => ({ speedIdx: (s.speedIdx + 1) % speeds.length })),
      seek: () => {},
      bars
    };
  }
}
</script>
</body>
</html>
